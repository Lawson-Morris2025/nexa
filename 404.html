<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in the Nexa</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --bg-dark: #050505;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1, .nav-logo {
            font-family: 'Space Grotesk', sans-serif;
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15) 0%, rgba(0, 242, 255, 0.05) 50%, rgba(5, 5, 5, 1) 100%);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .floating-icon {
            animation: float 6s ease-in-out infinite;
        }

        .btn-glow {
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-glow:hover {
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.5);
            transform: translateY(-2px);
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(10px, 9999px, 86px, 0); }
            60% { clip: rect(57px, 9999px, 14px, 0); }
            80% { clip: rect(82px, 9999px, 55px, 0); }
            100% { clip: rect(25px, 9999px, 100px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(15px, 9999px, 30px, 0); }
            40% { clip: rect(45px, 9999px, 75px, 0); }
            60% { clip: rect(5px, 9999px, 20px, 0); }
            80% { clip: rect(85px, 9999px, 50px, 0); }
            100% { clip: rect(35px, 9999px, 90px, 0); }
        }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <div class="hero-gradient"></div>

    <div class="max-w-2xl w-full px-6 text-center">
        <div class="glass p-12 md:p-20 relative overflow-hidden">
            <!-- Background Decoration -->
            <div class="absolute -top-24 -left-24 w-64 h-64 bg-[#00f2ff]/5 blur-3xl rounded-full"></div>
            <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-[#7000ff]/5 blur-3xl rounded-full"></div>

            <div class="floating-icon mb-8">
                <i data-lucide="rocket" class="w-20 h-20 text-[#00f2ff] mx-auto opacity-80"></i>
            </div>

            <h1 class="text-8xl md:text-9xl font-black mb-4 tracking-tighter glitch" data-text="404">404</h1>
            
            <h2 class="text-2xl md:text-3xl font-bold mb-6 text-white italic">
                You've drifted out of the <span class="text-[#00f2ff]">Nexa.</span>
            </h2>
            
            <p class="text-gray-400 mb-10 text-lg leading-relaxed max-w-md mx-auto">
                The page you're looking for has either moved to another dimension or never existed at all.
            </p>

            <a href="index.html" class="btn-glow bg-gradient-to-r from-[#00f2ff] to-[#7000ff] text-white font-bold py-4 px-10 rounded-2xl text-lg flex items-center justify-center gap-3 mx-auto w-full sm:w-auto">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Back to Nexa Studios
            </a>
            
            <div class="mt-12 pt-8 border-t border-white/5">
                <p class="text-[10px] tracking-[0.3em] uppercase text-gray-600">
                    System Error: Route Not Found
                </p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Stars Background
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.opacity = Math.random();
                this.speed = Math.random() * 0.05;
            }
            update() {
                this.opacity += this.speed;
                if (this.opacity > 1 || this.opacity < 0) {
                    this.speed = -this.speed;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity * 0.5})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) {
            stars.push(new Star());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.update();
                s.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
